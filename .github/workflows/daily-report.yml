name: Daily Crypto Morning Report

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate report
        run: |
          python3 << 'EOF'
          import os, requests
          from datetime import datetime, timezone, timedelta

          tz = timezone(timedelta(hours=8))
          now = datetime.now(tz)
          date = now.strftime('%Y%m%d')
          date_cn = now.strftime('%Y年%-m月%-d日')

          try:
            p = requests.get('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,ripple&vs_currencies=usd&include_24hr_change=true', timeout=10).json()
            def fmt(k):
              v = p[k]['usd']
              c = p[k]['usd_24h_change']
              arrow = '▲' if c>=0 else '▼'
              cls = 'up' if c>=0 else 'down'
              price = f'${v:,.0f}' if v>100 else f'${v:,.2f}'
              return price, f'<div class="coin-change {cls}">{arrow} {abs(c):.2f}% 24H</div>'
            btc_p,btc_c = fmt('bitcoin')
            eth_p,eth_c = fmt('ethereum')
            sol_p,sol_c = fmt('solana')
            xrp_p,xrp_c = fmt('ripple')
          except:
            btc_p=eth_p=sol_p=xrp_p='--'
            btc_c=eth_c=sol_c=xrp_c=''

          try:
            fg = requests.get('https://api.alternative.me/fng/?limit=1', timeout=10).json()
            fgv = fg['data'][0]['value']
            fgl = {'Extreme Fear':'极度恐慌','Fear':'恐慌','Neutral':'中性','Greed':'贪婪','Extreme Greed':'极度贪婪'}.get(fg['data'][0]['value_classification'],'--')
          except:
            fgv,fgl = '--','--'

          html = f"""<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>加密行业热点早报 · {date_cn}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
<style>
:root{{--black:#000;--neo:#191919;--neon:#BCFF2F;--g1:#111;--g2:#1a1a1a;--ts:#999;--td:#666;--th:#444;--brd:rgba(255,255,255,0.06);--red:#FF4D4D;--green:#2ECC71;}}
*{{margin:0;padding:0;box-sizing:border-box;}}
body{{background:#000;color:#fff;font-family:'Noto Sans SC',sans-serif;font-size:14px;}}
.wrap{{max-width:480px;margin:0 auto;padding:16px 12px 40px;}}
.hd{{text-align:center;padding:28px 0 20px;border-bottom:1px solid var(--brd);margin-bottom:16px;}}
.badge{{display:inline-flex;align-items:center;gap:6px;background:var(--neo);border:1px solid var(--brd);padding:4px 12px;border-radius:20px;font-size:11px;color:var(--ts);margin-bottom:14px;}}
.dot{{width:6px;height:6px;background:var(--neon);border-radius:50%;animation:pulse 2s infinite;}}
@keyframes pulse{{0%,100%{{opacity:1}}50%{{opacity:.4}}}}
h1{{font-family:'Noto Serif SC',serif;font-size:26px;font-weight:700;letter-spacing:2px;margin-bottom:6px;}}
.neon{{color:var(--neon);}}
.sub{{font-size:11px;color:var(--td);margin-bottom:14px;}}
.stags{{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}}
.stag{{background:var(--g1);border:1px solid var(--brd);padding:3px 10px;border-radius:12px;font-size:10px;color:var(--td);}}
.mkt{{background:var(--neo);border:1px solid var(--brd);border-radius:12px;margin-bottom:16px;overflow:hidden;}}
.mkth{{display:flex;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--brd);}}
.mkttl{{font-size:12px;font-weight:600;color:var(--ts);}}
.mkttime{{font-size:10px;color:var(--td);}}
.grid{{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--brd);}}
.ci{{background:var(--g1);padding:12px 14px;}}
.cl{{display:flex;align-items:center;gap:6px;margin-bottom:4px;}}
.ico{{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;}}
.btc{{background:#F7931A;color:#fff;}}.eth{{background:#627EEA;color:#fff;}}.sol{{background:#9945FF;color:#fff;}}.xrp{{background:#346AA9;color:#fff;}}
.cn{{font-size:11px;font-weight:600;color:var(--ts);}}
.cp{{font-size:18px;font-weight:700;}}
.coin-change{{font-size:11px;font-weight:600;margin-top:2px;}}
.up{{color:var(--green);}}.down{{color:var(--red);}}
.stats{{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--g2);border-top:1px solid var(--brd);}}
.si{{padding:10px 12px;text-align:center;border-right:1px solid var(--brd);}}
.si:last-child{{border-right:none;}}
.sl{{font-size:9px;color:var(--td);margin-bottom:3px;}}
.sv{{font-size:12px;font-weight:700;}}
.fb{{background:rgba(255,77,77,.15);border:1px solid rgba(255,77,77,.3);color:var(--red);font-size:9px;padding:2px 7px;border-radius:8px;font-weight:600;}}
.notice{{background:var(--neo);border:1px solid var(--brd);border-left:3px solid var(--neon);border-radius:10px;padding:16px;margin-bottom:16px;text-align:center;}}
.nt{{font-size:14px;font-weight:700;color:var(--neon);margin-bottom:8px;}}
.nd{{font-size:12px;color:var(--ts);line-height:1.7;}}
.ft{{text-align:center;padding-top:16px;border-top:1px solid var(--brd);}}
.disc{{font-size:10px;color:var(--th);margin-bottom:8px;}}
.comp{{font-size:10px;color:var(--th);letter-spacing:1px;}}
</style>
</head>
<body>
<div class="wrap">
<div class="hd">
  <div class="badge"><span class="dot"></span> {date_cn}</div>
  <h1>加密行业热点<span class="neon">早报</span></h1>
  <div class="sub">多源去重 · 分类评级 · 自动生成</div>
  <div class="stags"><span class="stag">Odaily</span><span class="stag">吴说</span><span class="stag">BlockBeats</span><span class="stag">CoinDesk</span></div>
</div>
<div class="mkt">
  <div class="mkth"><span class="mkttl">📊 实时行情</span><span class="mkttime">{now.strftime('%H:%M')} UTC+8</span></div>
  <div class="grid">
    <div class="ci"><div class="cl"><div class="ico btc">₿</div><span class="cn">BTC</span></div><div class="cp">{btc_p}</div>{btc_c}</div>
    <div class="ci"><div class="cl"><div class="ico eth">Ξ</div><span class="cn">ETH</span></div><div class="cp">{eth_p}</div>{eth_c}</div>
    <div class="ci"><div class="cl"><div class="ico sol">◎</div><span class="cn">SOL</span></div><div class="cp">{sol_p}</div>{sol_c}</div>
    <div class="ci"><div class="cl"><div class="ico xrp">✕</div><span class="cn">XRP</span></div><div class="cp">{xrp_p}</div>{xrp_c}</div>
  </div>
  <div class="stats">
    <div class="si"><div class="sl">恐慌指数</div><div class="sv"><span class="fb">{fgv} {fgl}</span></div></div>
    <div class="si"><div class="sl">BTC主导率</div><div class="sv">~57%</div></div>
    <div class="si"><div class="sl">更新时间</div><div class="sv" style="font-size:10px">{now.strftime('%H:%M')}</div></div>
  </div>
</div>
<div class="notice">
  <div class="nt">📋 {date_cn} 早报已自动生成</div>
  <div class="nd">行情数据实时更新<br>详细资讯请查阅完整版早报</div>
</div>
<div class="ft">
  <div class="disc">⚠️ 本早报仅为信息整合，不构成任何投资建议。</div>
  <div class="comp">AUTO GENERATED BY CLAUDE · {date}</div>
</div>
</div>
</body>
</html>"""

          with open(f'{date}.html','w',encoding='utf-8') as f:
            f.write(html)
          print(f'Done: {date}.html')
          EOF

      - name: Commit and push
        run: |
          DATE=$(TZ='Asia/Shanghai' date +%Y%m%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${DATE}.html
          git diff --cached --quiet || git commit -m "Auto: 加密早报 ${DATE}"
          git push
      
